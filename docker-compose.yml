services:
  ml:
    build:
      context: ./ml
      dockerfile: Dockerfile
    environment:
      MODEL_PATH: /data/models/kp_lstm.pt
    volumes:
      - data:/data
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file: ./backend/.env
    environment:
      DB_PATH: /data/astraeus.duckdb
      ML_SERVICE_URL: http://ml:8000
      BIND_ADDR: "0.0.0.0:3000"
    volumes:
      - data:/data
    depends_on:
      - ml
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /opt/astraeusio/cf-origin.crt:/etc/ssl/astraeusio/selfsigned.crt:ro
      - /opt/astraeusio/cf-origin.key:/etc/ssl/astraeusio/selfsigned.key:ro
      - letsencrypt:/etc/letsencrypt
      - letsencrypt_www:/var/www/certbot
    depends_on:
      - backend
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  data:
  letsencrypt:
  letsencrypt_www:
