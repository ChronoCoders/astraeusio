services:
  ml:
    build:
      context: ./ml
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      MODEL_PATH: /data/models/kp_lstm.pt
    volumes:
      - data:/data
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    env_file: ./backend/.env
    environment:
      DB_PATH: /data/astraeus.duckdb
      ML_SERVICE_URL: http://ml:8000
      BIND_ADDR: "0.0.0.0:3000"
    volumes:
      - data:/data
    depends_on:
      - ml
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  data:
