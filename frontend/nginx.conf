server {
    listen 80;
    server_name _;
    return 301 https://$host$request_uri;
}

map $http_accept $wants_markdown {
    default          0;
    "~*text/markdown" 1;
}

server {
    listen 443 ssl;
    server_name _;

    ssl_certificate     /etc/ssl/astraeusio/selfsigned.crt;
    ssl_certificate_key /etc/ssl/astraeusio/selfsigned.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    root  /usr/share/nginx/html;
    index index.html;

    add_header X-Content-Type-Options  nosniff    always;
    add_header X-Frame-Options         SAMEORIGIN always;
    add_header Link '</.well-known/api-catalog>; rel="api-catalog", </docs>; rel="service-doc", </sitemap.xml>; rel="sitemap"' always;
    add_header Vary                    Accept     always;

    location = /index.md {
        default_type "text/markdown; charset=utf-8";
    }

    location /api/ {
        proxy_pass         http://backend:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_read_timeout 30s;
    }

    location /auth/ {
        proxy_pass         http://backend:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    }

    location = /.well-known/api-catalog {
        default_type "application/linkset+json";
        try_files $uri =404;
    }

    location = /.well-known/http-message-signatures-directory {
        default_type "application/jwk-set+json";
        try_files $uri =404;
    }

    location /.well-known/ {
        try_files $uri =404;
    }

    location = / {
        if ($wants_markdown) {
            rewrite ^ /index.md last;
        }
        try_files $uri /index.html;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
